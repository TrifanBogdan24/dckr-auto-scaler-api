name: Build and Push Images

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME_API: ${{ github.repository }}/api-service
  IMAGE_NAME_WORKER: ${{ github.repository }}/job-worker

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}


      - name: Build API Service
        run: docker build -t ghcr.io/${{ github.repository }}:latest ./api-service


      - name: Build Job Worker
        run: docker build -t ghcr.io/${{ github.repository }}:latest ./job-worker

      - name: Push API Service
        run: docker push ghcr.io/${{ github.repository }}:latest


      - name: Push Job Worker
        run: docker push ghcr.io/${{ github.repository }}:latest

