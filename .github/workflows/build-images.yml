name: Build and Push Images

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME_API: ${{ github.repository }}/api-service
  IMAGE_NAME_WORKER: ${{ github.repository }}/job-worker

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for API
        id: meta-api
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_API }}
          tags: |
            type=raw,value=latest
            type=sha

      - name: Build and push API Service
        uses: docker/build-push-action@v5
        with:
          context: ./api-service
          push: true
          tags: ${{ id.meta-api.outputs.tags }}
          labels: ${{ id.meta-api.outputs.labels }}

      - name: Extract metadata for Worker
        id: meta-worker
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_WORKER }}
          tags: |
            type=raw,value=latest
            type=sha

      - name: Build and push Job Worker
        uses: docker/build-push-action@v5
        with:
          context: ./job-worker
          push: true
          tags: ${{ id.meta-worker.outputs.tags }}
          labels: ${{ id.meta-worker.outputs.labels }}
    